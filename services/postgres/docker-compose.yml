services:
  db:
    image: postgres:18-alpine
    restart: always
    user: "999:999"
    environment:
      POSTGRES_USER: ${MASTER_USER}
      POSTGRES_PASSWORD: ${MASTER_PASSWORD}
      POSTGRES_DB: ${MASTER_DB} 

      IMPACT_SPHERE_DB_USER: ${IMPACT_SPHERE_DB_USER}
      IMPACT_SPHERE_DB_PASSWORD: ${IMPACT_SPHERE_DB_PASSWORD}
      IMPACT_SPHERE_DB_NAME: ${IMPACT_SPHERE_DB_NAME}
    networks:
      - postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  postgres:
    driver: bridge

volumes:
  pgdata:
